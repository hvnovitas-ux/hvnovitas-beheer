<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HV Novitas - Nieuwsbeheer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <header class="topbar">

        <div class="logo">
            🧡 HV Novitas Beheer
        </div>

        <div class="user">

            <img id="foto"
                 src=""
                 alt="Profielfoto"
                 style="display:none;">

            <span id="naam">Laden...</span>

            <button id="logout">
                🚪 Uitloggen
            </button>

        </div>

    </header>

    <section class="welkom">

        <h1>📰 Nieuwsbeheer</h1>

        <p>
            Publiceer nieuws voor de website van HV Novitas.
        </p>

    </section>

    <div class="news-layout">

        <!-- Formulier -->

        <div class="formulier">

            <h2>Nieuw bericht</h2>

            <label>Titel</label>

            <input
                type="text"
                id="title"
                placeholder="Titel van het nieuwsbericht">

            <label>Categorie</label>

            <select id="categorie">

                <option>Nieuws</option>
                <option>Wedstrijd</option>
                <option>Activiteit</option>
                <option>Jeugd</option>
                <option>Senioren</option>

            </select>

            <label>Bericht</label>

            <textarea
                id="text"
                rows="10"
                placeholder="Typ hier het nieuwsbericht..."></textarea>

            <label>Foto</label>

            <input
                type="file"
                id="fotoUpload"
                accept="image/*">

            <br><br>

            <label>

                <input
                    type="checkbox"
                    id="vastzetten">

                Bericht vastzetten

            </label>

            <br><br>

            <button id="publish">

                💾 Publiceren

            </button>

            <button id="reset">

                ✖ Wissen

            </button>

            <p id="melding"></p>

        </div>

        <!-- Voorbeeld -->

        <div class="voorbeeld">

            <h2>Voorbeeld</h2>

            <div class="voorbeeld-kaart">

                <h2 id="voorbeeldTitel">

                    Titel

                </h2>

                <small id="voorbeeldDatum">

                    Vandaag

                </small>

                <img
                    id="voorbeeldFoto"
                    style="display:none;width:100%;border-radius:10px;">

                <p id="voorbeeldTekst">

                    Hier verschijnt een voorbeeld van je bericht.

                </p>

            </div>

        </div>

    </div>

    <section class="nieuwslijst">

        <h2>Laatste nieuws</h2>

        <div id="newsList">

            Nieuws wordt geladen...

        </div>

    </section>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="dashboard.js"></script>
<script type="module" src="news.js"></script>

</body>

</html>
