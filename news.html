<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HV Novitas - Nieuwsbeheer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <header class="topbar">

        <div class="logo">
            🧡 HV Novitas Beheer
        </div>

        <div class="user">

            <img id="foto"
                 src=""
                 alt="Profielfoto"
                 style="display:none;">

            <span id="naam">Laden...</span>

            <button id="logout">
                🚪 Uitloggen
            </button>

        </div>

    </header>

    <section class="welkom">

        <h1>📰 Nieuwsbeheer</h1>

        <p>Plaats hier nieuws voor de website van HV Novitas.</p>

    </section>

    <section class="formulier">

        <h2>Nieuw bericht</h2>

        <label for="title">Titel</label>

        <input
            type="text"
            id="title"
            placeholder="Titel van het nieuwsbericht">

        <label for="text">Bericht</label>

        <textarea
            id="text"
            rows="10"
            placeholder="Typ hier het nieuwsbericht..."></textarea>

        <!-- FOTO -->

        <label for="photo">
            📷 Foto
        </label>

        <input
            type="file"
            id="photo"
            accept="image/*">

        <div id="photoPreview"></div>

        <div class="knoppen">

            <button id="publish">
                💾 Publiceren
            </button>

            <button id="reset" type="button">
                ✖ Wissen
            </button>

        </div>

        <p id="melding"></p>

    </section>

    <section class="nieuwslijst">

        <h2>Geplaatste berichten</h2>

        <div id="newsList">

            Nog geen nieuws geplaatst.

        </div>

    </section>

</div>

<!-- Google Identity -->

<script src="https://accounts.google.com/gsi/client"></script>

<!-- Google API -->

<script src="https://apis.google.com/js/api.js"></script>

<script type="module" src="firebase.js"></script>
<script type="module" src="dashboard.js"></script>
<script type="module" src="drive.js"></script>
<script type="module" src="news.js"></script>

</body>

</html>
