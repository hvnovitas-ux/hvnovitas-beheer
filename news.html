<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HV Novitas Nieuws</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.news-item {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.news-item img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.actions button {
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.actions button:first-child {
    background: #333;
    color: white;
}

.actions .delete {
    background: red;
    color: white;
}

</style>

</head>

<body>

<div class="topbar"> HV NOVITAS NIEUWS</div>

<div class="container">

    <div id="newsList"></div>

</div>

<!-- SCRIPTS -->
<script type="module" src="firebase.js"></script>
<script type="module" src="news.js"></script>

</body>

</html>
