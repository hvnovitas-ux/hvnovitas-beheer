<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HV Novitas CMS - Nieuws</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <!-- =======================================
         HEADER
    ======================================== -->

    <header class="topbar">

        <div class="logo-area">

            <img
                src="images/logo.png"
                class="logo"
                alt="HV Novitas">

            <div>

                <h1>HV NOVITAS CMS</h1>

                <p>Nieuwsbeheer</p>

            </div>

        </div>

        <div class="user-area">

            <div class="status">

                <span class="online"></span>

                Ingelogd

            </div>

            <div id="naam">

                Laden...

            </div>

            <div id="email">

            </div>

            <button id="logoutButton">

                Uitloggen

            </button>

        </div>

    </header>

    <!-- =======================================
         PAGINA TITEL
    ======================================== -->

    <section class="page-title">

        <h2>Nieuwsbeheer</h2>

        <p>
            Voeg nieuws toe, wijzig bestaande berichten of verwijder oude berichten.
        </p>

    </section>

    <!-- =======================================
         TWEE KOLOMMEN
    ======================================== -->

    <main class="news-layout">

        <!-- ===============================
             LINKER KOLOM
        ================================ -->

        <section class="news-editor">

            <h3>Nieuw bericht</h3>

            <label>Titel</label>

            <input
                type="text"
                id="title"
                placeholder="Titel van het nieuwsbericht">

            <label>Bericht</label>

            <textarea
                id="text"
                rows="12"
                placeholder="Typ hier het nieuwsbericht..."></textarea>

            <label>Foto</label>

            <input
                type="file"
                id="photo"
                accept="image/*">

            <div id="photoPreview"></div>

            <div class="editor-buttons">

                <button id="publish">

                    Publiceren

                </button>

                <button id="reset">

                    Wissen

                </button>

            </div>

            <p id="melding"></p>

        </section>

        <!-- ===============================
             RECHTER KOLOM
        ================================ -->

        <section class="news-overview">

            <div class="overview-header">

                <h3>Nieuwsberichten</h3>

                <button id="refreshNews">

                    Vernieuwen

                </button>

            </div>

            <input
                type="text"
                id="searchNews"
                placeholder="Zoek een nieuwsbericht...">

            <div id="newsList">

                <div class="empty-news">

                    Nog geen nieuws geplaatst.

                </div>
                  </div>

        </section>

    </main>

    <!-- =======================================
         FOOTER
    ======================================== -->

    <footer class="footer">

        <div class="footer-left">

            <div class="system-status">

                <span class="status-dot"></span>

                Google Drive

            </div>

            <div class="system-status">

                <span class="status-dot"></span>

                Firebase

            </div>

        </div>

        <div class="footer-center">

            HV Novitas CMS

        </div>

        <div class="footer-right">

            Versie 1.0

        </div>

    </footer>

</div>

<!-- Google Identity -->

<script src="https://accounts.google.com/gsi/client"></script>

<!-- Google API -->

<script src="https://apis.google.com/js/api.js"></script>

<script type="module" src="firebase.js"></script>
<script type="module" src="dashboard.js"></script>
<script type="module" src="drive.js"></script>
<script type="module" src="news.js"></script>

</body>

</html>
