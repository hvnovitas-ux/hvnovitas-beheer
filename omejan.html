<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ome Jan</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

/* ================= SLIDER ================= */

.slider {
    width: 100%;
    max-width: 600px;
    margin: auto;
    overflow: hidden;
    border-radius: 12px;
    touch-action: pan-y;
    position: relative;
}

#sliderTrack {
    display: flex;
    transition: transform 0.5s ease-in-out;
}

#sliderTrack img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    flex-shrink: 0;
    user-select: none;
}

/* ================= DOTS ================= */

#dots {
    text-align: center;
    margin-top: 10px;
}

.dot {
    height: 8px;
    width: 8px;
    margin: 4px;
    display: inline-block;
    background: #ccc;
    border-radius: 50%;
}

.dot.active {
    background: #ff6a00;
}

</style>

</head>

<body>

<div class="slider" id="slider">
    <div id="sliderTrack"></div>
</div>

<div id="dots"></div>

<!-- ================= FIREBASE ================= -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const track = document.getElementById("sliderTrack");
const dots = document.getElementById("dots");
const slider = document.getElementById("slider");

let images = [];
let index = 0;
let interval = null;

// ================= LOAD =================

onValue(ref(db, "omejan"), (snapshot) => {

    const data = snapshot.val();
    if (!data) return;

    images = Object.values(data);
    index = 0;

    track.innerHTML = images.map(img => `
        <img src="${img.imageUrl}">
    `).join("");

    createDots();
    update();
    startAutoPlay();
});

// ================= DOTS =================

function createDots() {

    dots.innerHTML = "";

    images.forEach(() => {
        const d = document.createElement("span");
        d.className = "dot";
        dots.appendChild(d);
    });
}

// ================= UPDATE =================

function update() {

    track.style.transform = `translateX(-${index * 100}%)`;

    document.querySelectorAll(".dot").forEach((d, i) => {
        d.classList.toggle("active", i === index);
    });
}

// ================= AUTOPLAY =================

function startAutoPlay() {

    if (interval) clearInterval(interval);

    if (images.length <= 1) return;

    interval = setInterval(() => {

        index++;

        if (index >= images.length) {
            index = 0;
        }

        update();

    }, 3000);
}

// ================= SWIPE =================

let startX = 0;

slider.addEventListener("touchstart", (e) => {
    startX = e.touches[0].clientX;
});

slider.addEventListener("touchend", (e) => {
    handleSwipe(e.changedTouches[0].clientX);
});

slider.addEventListener("mousedown", (e) => {
    startX = e.clientX;
});

slider.addEventListener("mouseup", (e) => {
    handleSwipe(e.clientX);
});

function handleSwipe(endX) {

    let diff = startX - endX;

    if (Math.abs(diff) < 50) return;

    if (diff > 0) {
        index++;
    } else {
        index--;
    }

    if (index < 0) index = images.length - 1;
    if (index >= images.length) index = 0;

    update();
}

</script>

</body>
</html>
