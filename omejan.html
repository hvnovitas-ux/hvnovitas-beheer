<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ome Jan - HV Novitas</title>

<style>

/* ================= BASIC ================= */

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* ================= SLIDER ================= */

.slider {
    width: 100%;
    overflow: hidden;
}

#sliderTrack {
    display: flex;
    transition: transform 0.6s ease-in-out;
}

#sliderTrack img {
    width: 100%;
    height: 400px;
    object-fit: cover;
    flex-shrink: 0;
}

/* ================= DOTS ================= */

#dots {
    text-align: center;
    margin-top: 10px;
}

.dot {
    height: 10px;
    width: 10px;
    margin: 5px;
    display: inline-block;
    background: #ccc;
    border-radius: 50%;
}

.dot.active {
    background: #ff6a00;
}

</style>

</head>

<body>

<div class="topbar">
📸 Ome Jan ondersteunt HV Novitas
</div>

<div class="slider">
    <div id="sliderTrack"></div>
</div>

<div id="dots"></div>

<!-- ================= FIREBASE + JS ================= -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const track = document.getElementById("sliderTrack");
const dots = document.getElementById("dots");

let images = [];
let index = 0;

// ================= LOAD DATA =================

onValue(ref(db, "omejan"), (snapshot) => {

    const data = snapshot.val();

    if (!data) {
        track.innerHTML = "<p>Geen foto's</p>";
        return;
    }

    images = Object.values(data);

    track.innerHTML = images.map(img => `
        <img src="${img.imageUrl}">
    `).join("");

    createDots();
    startSlider();
});

// ================= DOTS =================

function createDots() {

    dots.innerHTML = "";

    images.forEach((_, i) => {

        const dot = document.createElement("span");
        dot.className = "dot";

        dots.appendChild(dot);
    });
}

// ================= SLIDER =================

function startSlider() {

    if (images.length <= 1) return;

    setInterval(() => {

        index++;

        if (index >= images.length) {
            index = 0;
        }

        track.style.transform = `translateX(-${index * 100}%)`;

        updateDots();

    }, 3000);
}

// ================= DOT ACTIVE =================

function updateDots() {

    const allDots = document.querySelectorAll(".dot");

    allDots.forEach((d, i) => {
        d.classList.toggle("active", i === index);
    });
}

</script>

</body>
</html>
