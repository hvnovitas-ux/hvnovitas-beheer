<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ome Jan</title>

<style>

/* ================= PAGE RESET ================= */

body {
    margin: 0;
    font-family: Arial;
    background: transparent; /* 👈 belangrijk voor embed */
}

/* ================= RESPONSIVE WRAPPER ================= */

.slider {
    width: 100%;
    height: 100%;
    max-height: 400px;
    overflow: hidden;
    border-radius: 12px;
}

/* ================= TRACK ================= */

#sliderTrack {
    display: flex;
    height: 100%;
    transition: transform 0.6s ease-in-out;
}

/* ================= IMAGES ================= */

#sliderTrack img {
    width: 100%;
    height: 100%;
    max-height: 400px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
}

/* ================= DOTS ================= */

#dots {
    text-align: center;
    margin-top: 8px;
}

.dot {
    height: 8px;
    width: 8px;
    margin: 4px;
    display: inline-block;
    background: #ccc;
    border-radius: 50%;
}

.dot.active {
    background: #ff6a00;
}

/* ================= AUTO HEIGHT FIX ================= */

.container {
    width: 100%;
    height: 100%;
}

</style>

</head>

<body>

<div class="container">

    <div class="slider">
        <div id="sliderTrack"></div>
    </div>

    <div id="dots"></div>

</div>

<!-- ================= FIREBASE ================= -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const track = document.getElementById("sliderTrack");
const dots = document.getElementById("dots");

let images = [];
let index = 0;
let interval = null;

// ================= LOAD =================

onValue(ref(db, "omejan"), (snapshot) => {

    const data = snapshot.val();

    if (!data) {
        track.innerHTML = "<p>Geen foto's</p>";
        dots.innerHTML = "";
        return;
    }

    images = Object.values(data);
    index = 0;

    track.innerHTML = images.map(img => `
        <img src="${img.imageUrl}">
    `).join("");

    createDots();
    startSlider();
});

// ================= DOTS =================

function createDots() {

    dots.innerHTML = "";

    images.forEach(() => {
        const dot = document.createElement("span");
        dot.className = "dot";
        dots.appendChild(dot);
    });

    updateDots();
}

// ================= SLIDER =================

function startSlider() {

    if (interval) clearInterval(interval);

    if (images.length <= 1) return;

    interval = setInterval(() => {

        index++;

        if (index >= images.length) {
            index = 0;
        }

        track.style.transform = `translateX(-${index * 100}%)`;

        updateDots();

    }, 3000);
}

// ================= DOT UPDATE =================

function updateDots() {

    const allDots = document.querySelectorAll(".dot");

    allDots.forEach((d, i) => {
        d.classList.toggle("active", i === index);
    });
}

</script>

</body>
</html>
