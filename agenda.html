<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas Agenda</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f10; /* zwart */
    color: white;
}

/* TOPBAR */
.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* ITEM CARD */
.item {
    background: #1a1a1d;
    border-left: 5px solid #ff6a00;
    padding: 15px;
    margin-bottom: 12px;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.4);
}

/* TITEL */
.item b {
    color: #ff6a00;
    font-size: 18px;
}

/* DATUM */
.date {
    color: #aaa;
    font-size: 14px;
}

/* TEXT */
.item p {
    color: #ddd;
}

/* HOVER EFFECT */
.item:hover {
    transform: scale(1.01);
    transition: 0.2s;
}

</style>

</head>

<body>

<div class="topbar">
NOVITAS AGENDA
</div>

<div class="container">

    <div id="agendaList"></div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="agenda-view.js"></script>

</body>
</html>
