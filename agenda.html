<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>HV Novitas Agenda</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff6a00;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    max-width: 900px;
    margin: auto;
}

.cal-head {
    font-weight: bold;
    text-align: center;
    padding: 8px;
    background: #ff6a00;
    color: white;
    border-radius: 6px;
}

.cal-day {
    background: white;
    padding: 15px;
    text-align: center;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.cal-day:hover {
    background: #ffe0cc;
}

.empty {
    background: transparent;
}
</style>

</head>

<body>

<h1>📅 HV NOVITAS AGENDA</h1>

<div id="miniCalendar"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const miniCalendar = document.getElementById("miniCalendar");

// ================= CALENDAR =================

function createCalendar() {

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    const daysInMonth = lastDay.getDate();
    const startDay = firstDay.getDay();

    const days = ["Zo", "Ma", "Di", "Wo", "Do", "Vr", "Za"];

    let html = "";

    days.forEach(d => {
        html += `<div class="cal-head">${d}</div>`;
    });

    for (let i = 0; i < startDay; i++) {
        html += `<div class="empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        html += `<div class="cal-day">${d}</div>`;
    }

    miniCalendar.innerHTML = html;
}

createCalendar();

</script>

</body>
</html>
