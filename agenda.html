<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<title>HV Novitas Agenda</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f4f6f8;
}

h1 {
    text-align: center;
    color: #ff6a00;
}

/* CALENDAR */

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    max-width: 900px;
    margin: auto;
}

.cal-head {
    text-align: center;
    background: #ff6a00;
    color: white;
    padding: 8px;
    border-radius: 6px;
    font-weight: bold;
}

.cal-day {
    background: white;
    min-height: 70px;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
}

.cal-day:hover {
    background: #ffe0cc;
}

/* EVENTS */

.event {
    font-size: 10px;
    margin-top: 3px;
    padding: 2px;
    border-radius: 4px;
    color: white;
}

.match { background: #ff6a6a; }
.training { background: #6aa9ff; }
.clubday { background: #ffb84d; }
.eventType { background: #b56aff; }
.meeting { background: #7ad97a; }

/* POPUP */

#popup {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.popup-box {
    background: white;
    width: 300px;
    margin: 100px auto;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin: 5px 0;
}

button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    border-radius: 6px;
}

</style>

</head>

<body>

<h1>📅 HV NOVITAS AGENDA</h1>

<div id="calendar" class="calendar-grid"></div>

<!-- POPUP -->
<div id="popup">
    <div class="popup-box">

        <h3>Nieuwe afspraak</h3>

        <input id="dateInput" readonly>

        <select id="typeInput">
            <option value="match">Wedstrijd</option>
            <option value="training">Training</option>
            <option value="clubday">Clubdag</option>
            <option value="event">Event</option>
            <option value="meeting">Vergadering</option>
        </select>

        <input id="team1" placeholder="Team / titel">
        <input id="team2" placeholder="Tegenstander (optioneel)">
        <input id="time" placeholder="Tijd (19:00)">

        <button id="save">Opslaan</button>
        <button onclick="closePopup()">Sluiten</button>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    get,
    push
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const calendar = document.getElementById("calendar");

let selectedDate = "";

/* ================= CALENDAR ================= */

function createCalendar() {

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);

    const daysInMonth = last.getDate();
    const start = first.getDay();

    const days = ["Zo","Ma","Di","Wo","Do","Vr","Za"];

    let html = "";

    days.forEach(d => {
        html += `<div class="cal-head">${d}</div>`;
    });

    for (let i = 0; i < start; i++) {
        html += `<div></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {

        html += `
            <div class="cal-day" onclick="openPopup(${d})">
                <b>${d}</b>
            </div>
        `;
    }

    calendar.innerHTML = html;
}

createCalendar();

/* ================= POPUP ================= */

window.openPopup = (day) => {

    selectedDate = day + " feb";

    document.getElementById("dateInput").value = selectedDate;

    document.getElementById("popup").style.display = "block";
};

window.closePopup = () => {
    document.getElementById("popup").style.display = "none";
};

/* ================= SAVE ================= */

document.getElementById("save").addEventListener("click", async () => {

    const type = document.getElementById("typeInput").value;
    const team1 = document.getElementById("team1").value;
    const team2 = document.getElementById("team2").value;
    const time = document.getElementById("time").value;

    await push(ref(db, "agenda"), {
        date: selectedDate,
        type,
        team1,
        team2,
        time,
        created: Date.now()
    });

    closePopup();
});

</script>

</body>
</html>
