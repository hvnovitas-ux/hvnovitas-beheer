<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<title>HV Novitas Agenda</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f4f6f8;
}

h1 {
    text-align: center;
    color: #ff6a00;
}

/* ===== CALENDAR GRID ===== */

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    max-width: 900px;
    margin: auto;
}

.cal-head {
    font-weight: bold;
    text-align: center;
    padding: 8px;
    background: #ff6a00;
    color: white;
    border-radius: 6px;
}

.cal-day {
    background: white;
    padding: 10px;
    min-height: 60px;
    border-radius: 6px;
    position: relative;
}

.empty {
    background: transparent;
}

/* ===== EVENTS ===== */

.event {
    font-size: 10px;
    margin-top: 3px;
    padding: 2px;
    border-radius: 4px;
    color: white;
}

.match { background: #ff6a6a; }
.training { background: #6aa9ff; }
.clubday { background: #ffb84d; }
.eventType { background: #b56aff; }
.meeting { background: #7ad97a; }

</style>

</head>

<body>

<h1>📅 HV NOVITAS AGENDA</h1>

<div id="miniCalendar" class="calendar-grid"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    get
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const calendar = document.getElementById("miniCalendar");

let agendaData = [];

/* ================= LOAD AGENDA ================= */

async function loadAgenda() {

    const snap = await get(ref(db, "agenda"));

    if (snap.exists()) {
        agendaData = Object.values(snap.val());
    } else {
        agendaData = [];
    }

    renderCalendar();
}

/* ================= CALENDAR ================= */

function createCalendar() {

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);

    const daysInMonth = lastDay.getDate();
    const startDay = firstDay.getDay();

    const days = ["Zo", "Ma", "Di", "Wo", "Do", "Vr", "Za"];

    let html = "";

    days.forEach(d => {
        html += `<div class="cal-head">${d}</div>`;
    });

    for (let i = 0; i < startDay; i++) {
        html += `<div class="empty"></div>`;
    }

    for (let d = 1; d <= daysInMonth; d++) {
        html += `<div class="cal-day" data-day="${d}">
                    <b>${d}</b>
                 </div>`;
    }

    calendar.innerHTML = html;
}

/* ================= RENDER EVENTS ================= */

function renderCalendar() {

    document.querySelectorAll(".cal-day").forEach(dayEl => {

        const day = dayEl.dataset.day;

        const events = agendaData.filter(a => {
            if (!a.date) return false;
            return a.date.startsWith(day + " ");
        });

        events.forEach(ev => {

            let colorClass = "event";

            if (ev.type === "match") colorClass = "event match";
            if (ev.type === "training") colorClass = "event training";
            if (ev.type === "clubday") colorClass = "event clubday";
            if (ev.type === "event") colorClass = "event eventType";
            if (ev.type === "meeting") colorClass = "event meeting";

            const div = document.createElement("div");
            div.className = colorClass;
            div.innerHTML = `${ev.time || ""} ${ev.team1 || ""}`;

            dayEl.appendChild(div);
        });
    });
}

/* ================= START ================= */

createCalendar();
loadAgenda();

</script>

</body>
</html>
