<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas Agenda</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

/* TOPBAR */
.topbar {
    background: linear-gradient(90deg, #ff6a00, #ff8c1a);
    color: white;
    padding: 12px;
    text-align: center;
    font-weight: bold;
}

/* WRAPPER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

/* DAY BLOCK */
.day {
    margin-bottom: 15px;
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* ITEM */
.item {
    padding: 8px;
    margin-top: 6px;
    border-left: 5px solid #ddd;
    background: #fafafa;
    border-radius: 6px;
}

/* TYPES */
.match { border-left-color: #ff6a00; }
.training { border-left-color: #2ecc71; }
.meeting { border-left-color: #3498db; }

/* SMALL TEXT */
.small {
    font-size: 12px;
    color: #777;
}

</style>

</head>

<body>

<div class="topbar">
📅 HV NOVITAS AGENDA
</div>

<div class="container" id="agenda">

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    onValue
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// ================= FIREBASE =================

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const agendaEl = document.getElementById("agenda");

// ================= HELPERS =================

function safeDate(dateStr) {
    const d = new Date(dateStr);
    return isNaN(d) ? null : d;
}

// ================= LOAD AGENDA =================

onValue(ref(db, "agenda"), (snapshot) => {

    const data = snapshot.val();

    if (!data) {
        agendaEl.innerHTML = "<p>Geen agenda beschikbaar</p>";
        return;
    }

    const items = Object.values(data);

    // ================= SORT PER DAG =================

    let grouped = {};

    items.forEach(a => {

        if (!grouped[a.date]) {
            grouped[a.date] = [];
        }

        grouped[a.date].push(a);
    });

    // sort dates
    const sortedDates = Object.keys(grouped).sort((a, b) => {
        return new Date(a) - new Date(b);
    });

    let html = "";

    // ================= BUILD UI =================

    sortedDates.forEach(date => {

        html += `
            <div class="day">
                <h3>📅 ${date}</h3>
        `;

        grouped[date]
            .sort((a, b) => (a.time || "").localeCompare(b.time || ""))
            .forEach(a => {

                html += `
                    <div class="item ${a.type || ''}">
                        <b>${a.time || ""}</b><br>
                        ${a.team1 || ""} ${a.team2 ? "vs " + a.team2 : ""}
                        ${a.titleExtra ? `<div class="small">${a.titleExtra}</div>` : ""}
                    </div>
                `;
            });

        html += `</div>`;
    });

    agendaEl.innerHTML = html;
});

</script>

</body>

</html>
