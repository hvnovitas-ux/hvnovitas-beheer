<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<title>HV Novitas Agenda</title>

<style>

body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f4f6f8;
}

h1 {
    text-align: center;
    color: #ff6a00;
}

/* CALENDAR */

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    max-width: 900px;
    margin: auto;
}

.cal-head {
    text-align: center;
    background: #ff6a00;
    color: white;
    padding: 8px;
    border-radius: 6px;
    font-weight: bold;
}

.cal-day {
    background: white;
    min-height: 80px;
    padding: 5px;
    border-radius: 6px;
    cursor: pointer;
}

/* EVENTS */

.event {
    font-size: 10px;
    margin-top: 3px;
    padding: 2px;
    border-radius: 4px;
    color: white;
}

.match { background: #ff6a6a; }
.training { background: #6aa9ff; }
.clubday { background: #ffb84d; }
.eventType { background: #b56aff; }
.meeting { background: #7ad97a; }

/* POPUPS */

.popup {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
}

.box {
    background:white;
    width:300px;
    margin:100px auto;
    padding:20px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:8px;
    margin:5px 0;
}

button {
    width:100%;
    padding:8px;
    background:#ff6a00;
    color:white;
    border:none;
    border-radius:6px;
    margin-top:5px;
}

.deleteBtn {
    background:red;
}

</style>

</head>

<body>

<h1>📅 HV NOVITAS AGENDA</h1>

<div id="calendar" class="calendar-grid"></div>

<!-- ADD POPUP -->
<div id="popup" class="popup">
    <div class="box">

        <h3>Nieuwe afspraak</h3>

        <input id="dateInput" readonly>

        <select id="typeInput">
            <option value="match">Wedstrijd</option>
            <option value="training">Training</option>
            <option value="clubday">Clubdag</option>
            <option value="event">Event</option>
            <option value="meeting">Vergadering</option>
        </select>

        <input id="team1" placeholder="Team / titel">
        <input id="team2" placeholder="Tegenstander">
        <input id="time" placeholder="Tijd">

        <button id="saveBtn">Opslaan</button>
        <button onclick="closePopup()">Sluiten</button>

    </div>
</div>

<!-- EDIT POPUP -->
<div id="editPopup" class="popup">
    <div class="box">

        <h3>Event bewerken</h3>

        <input id="editTeam1">
        <input id="editTeam2">
        <input id="editTime">

        <button id="updateBtn">Update</button>
        <button class="deleteBtn" id="deleteBtn">Delete</button>
        <button onclick="closeEdit()">Sluiten</button>

    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    get,
    push,
    update,
    remove
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

/* ================= FIREBASE ================= */

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ================= VARS ================= */

const calendar = document.getElementById("calendar");

let selectedDate = "";
let editId = null;
let agendaData = [];

/* ================= LOAD DATA ================= */

async function loadAgenda() {

    const snap = await get(ref(db, "agenda"));

    if (snap.exists()) {
        agendaData = Object.entries(snap.val());
    } else {
        agendaData = [];
    }

    render();
}

/* ================= CALENDAR ================= */

function createCalendar() {

    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const first = new Date(year, month, 1);
    const last = new Date(year, month + 1, 0);

    const daysInMonth = last.getDate();
    const start = first.getDay();

    const days = ["Zo","Ma","Di","Wo","Do","Vr","Za"];

    let html = "";

    days.forEach(d => html += `<div class="cal-head">${d}</div>`);

    for (let i = 0; i < start; i++) html += `<div></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
        html += `<div class="cal-day" onclick="openPopup('${d}')"><b>${d}</b></div>`;
    }

    calendar.innerHTML = html;
}

/* ================= RENDER EVENTS ================= */

function render() {

    document.querySelectorAll(".cal-day").forEach(dayEl => {

        const day = dayEl.innerText.trim();

        const events = agendaData.filter(([id, a]) =>
            a.date?.startsWith(day + " ")
        );

        events.forEach(([id, ev]) => {

            const div = document.createElement("div");

            let cls = "event";

            if (ev.type === "match") cls += " match";
            if (ev.type === "training") cls += " training";
            if (ev.type === "clubday") cls += " clubday";
            if (ev.type === "event") cls += " eventType";
            if (ev.type === "meeting") cls += " meeting";

            div.className = cls;
            div.innerHTML = `${ev.time || ""} ${ev.team1 || ""}`;

            div.onclick = () => openEdit(id, ev);

            dayEl.appendChild(div);
        });
    });
}

/* ================= POPUPS ================= */

window.openPopup = (day) => {
    selectedDate = day + " feb";
    document.getElementById("dateInput").value = selectedDate;
    document.getElementById("popup").style.display = "block";
};

window.closePopup = () => {
    document.getElementById("popup").style.display = "none";
};

window.openEdit = (id, ev) => {

    editId = id;

    document.getElementById("editTeam1").value = ev.team1 || "";
    document.getElementById("editTeam2").value = ev.team2 || "";
    document.getElementById("editTime").value = ev.time || "";

    document.getElementById("editPopup").style.display = "block";
};

window.closeEdit = () => {
    document.getElementById("editPopup").style.display = "none";
};

/* ================= SAVE ================= */

document.getElementById("saveBtn").addEventListener("click", async () => {

    await push(ref(db, "agenda"), {
        date: selectedDate,
        type: document.getElementById("typeInput").value,
        team1: document.getElementById("team1").value,
        team2: document.getElementById("team2").value,
        time: document.getElementById("time").value,
        created: Date.now()
    });

    closePopup();
});

/* ================= UPDATE + DELETE ================= */

document.getElementById("updateBtn").addEventListener("click", async () => {

    await update(ref(db, "agenda/" + editId), {
        team1: document.getElementById("editTeam1").value,
        team2: document.getElementById("editTeam2").value,
        time: document.getElementById("editTime").value
    });

    closeEdit();
});

document.getElementById("deleteBtn").addEventListener("click", async () => {

    await remove(ref(db, "agenda/" + editId));

    closeEdit();
});

/* ================= START ================= */

createCalendar();
loadAgenda();

</script>

</body>
</html>
