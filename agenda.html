<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getDatabase,
    ref,
    get
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// ================= FIREBASE =================

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "hv-novitas-beheer.firebaseapp.com",
    databaseURL: "https://hv-novitas-beheer-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hv-novitas-beheer"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const agendaEl = document.getElementById("agenda");

// ================= LOAD AGENDA (LIGHT VERSION) =================

async function loadAgenda() {

    try {

        const snapshot = await get(ref(db, "agenda"));

        if (!snapshot.exists()) {
            agendaEl.innerHTML = "<p>Geen agenda beschikbaar</p>";
            return;
        }

        const data = snapshot.val();
        const items = Object.values(data);

        // ================= GROUP PER DAG =================

        let grouped = {};

        items.forEach(a => {

            if (!grouped[a.date]) {
                grouped[a.date] = [];
            }

            grouped[a.date].push(a);
        });

        // sort dates
        const sortedDates = Object.keys(grouped).sort((a, b) => {
            return new Date(a) - new Date(b);
        });

        let html = "";

        // ================= BUILD UI =================

        sortedDates.forEach(date => {

            html += `
                <div class="day">
                    <h3>📅 ${date}</h3>
            `;

            grouped[date]
                .sort((a, b) => (a.time || "").localeCompare(b.time || ""))
                .forEach(a => {

                    html += `
                        <div class="item ${a.type || ''}">
                            <b>${a.time || ""}</b><br>
                            ${a.team1 || ""} ${a.team2 ? "vs " + a.team2 : ""}
                            ${a.titleExtra ? `<div class="small">${a.titleExtra}</div>` : ""}
                        </div>
                    `;
                });

            html += `</div>`;
        });

        agendaEl.innerHTML = html;

    } catch (error) {
        console.error(error);
        agendaEl.innerHTML = "<p>Fout bij laden agenda</p>";
    }
}

// start
loadAgenda();

</script>
