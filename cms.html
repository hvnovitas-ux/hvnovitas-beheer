<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HV Novitas Beheer</title>

    <link rel="stylesheet" href="cms.css">

</head>

<body>

    <main class="container">

        <h1>🧡 HV Novitas Nieuwsbeheer</h1>

        <form id="newsForm">

            <div class="form-group">

                <label for="title">Titel</label>

                <input
                    type="text"
                    id="title"
                    maxlength="100"
                    required>

            </div>

            <div class="form-group">

                <label for="text">Nieuwsbericht</label>

                <textarea
                    id="text"
                    rows="8"
                    required></textarea>

            </div>

            <div class="form-group">

                <label for="image">Foto</label>

                <input
                    type="file"
                    id="image"
                    accept="image/*">

            </div>

            <div class="buttons">

                <button
                    type="submit"
                    id="submitButton">

                    💾 Nieuws opslaan

                </button>

                <button
                    type="button"
                    id="cancelButton"
                    style="display:none;">

                    Annuleren

                </button>

            </div>

        </form>

        <hr>

        <section>

            <h2>Geplaatste nieuwsberichten</h2>

            <div id="newsList">

                <p>Nieuws wordt geladen...</p>

            </div>

        </section>

    </main>

    <script type="module" src="cms.js"></script>

</body>

</html>
