<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HV Novitas CMS</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

.news-item {
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.actions button {
    background: #333;
}

.actions .delete {
    background: #e74c3c;
}

</style>

</head>

<body>

<div class="topbar">
🧡 HV NOVITAS CMS DASHBOARD
</div>

<div class="container">

    <!-- FORM -->
    <div class="box">

        <h2>Nieuw bericht</h2>

        <form id="newsForm">

            <input type="text" id="title" placeholder="Titel">
            <textarea id="text" rows="8" placeholder="Bericht"></textarea>

            <button type="submit" id="publish">
                Publiceren
            </button>

        </form>

        <p id="status"></p>

    </div>

    <!-- LIST -->
    <div class="box">

        <h2>Nieuws</h2>
        <div id="newsList"></div>

    </div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="cms.js"></script>

</body>
</html>
