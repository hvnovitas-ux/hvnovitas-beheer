<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HV Novitas CMS</title>

<style>
body { font-family: Arial; background:#f4f6f8; margin:0; }
.topbar { background:#ff6a00; color:white; padding:15px; font-size:20px; }
.container { max-width:900px; margin:auto; padding:20px; }

.box { background:white; padding:15px; border-radius:12px; margin-bottom:20px; }

input, textarea { width:100%; padding:10px; margin:5px 0; }

button { background:#ff6a00; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; }

.news-item { background:#fff; padding:10px; margin:10px 0; border-radius:10px; }

.actions { display:flex; gap:10px; }
.actions button { background:#333; }
.actions .delete { background:red; }
</style>

</head>

<body>

<div class="topbar">🧡 HV NOVITAS CMS</div>

<div class="container">

<!-- FORM -->
<div class="box">

<h2>Nieuw bericht</h2>

<form id="newsForm">

<input type="text" id="title" placeholder="Titel">
<textarea id="text" placeholder="Bericht"></textarea>
<input type="file" id="image">

<button type="submit">Publiceren</button>

</form>

<p id="status"></p>

</div>

<!-- LIST -->
<div class="box">

<h2>Berichten beheren</h2>
<div id="newsList"></div>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="cms.js"></script>

</body>
</html>
