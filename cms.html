<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas CMS</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BUTTON */
button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

/* LIST ITEMS */
.news-item {
    background: #fff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* SPONSORS */
#sponsorList {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

#sponsorList img {
    height: 60px;
    background: white;
    padding: 5px;
    border-radius: 8px;
}

/* OME JAN */
#omejanList {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

#omejanList img {
    height: 80px;
    border-radius: 10px;
}

/* AGENDA */
#agendaList {
    margin-top: 10px;
}

</style>

</head>

<body>

<div class="topbar">🧡 HV NOVITAS CMS</div>

<div class="container">

<!-- ================= NEWS ================= -->
<div class="box">

    <h2>📰 Nieuws</h2>

    <form id="newsForm">
        <input id="title" placeholder="Titel">
        <textarea id="text" placeholder="Bericht"></textarea>
        <button type="submit">Publiceren</button>
    </form>

    <p id="newsStatus"></p>

    <div id="newsList"></div>

</div>

<!-- ================= SPONSORS ================= -->
<div class="box">

    <h2>🤝 Sponsors</h2>

    <input type="file" id="logo">
    <button id="saveSponsor">Upload sponsor</button>

    <p id="sponsorStatus"></p>

    <div id="sponsorList"></div>

</div>

<!-- ================= OME JAN ================= -->
<div class="box">

    <h2>📸 Ome Jan</h2>

    <input type="file" id="omejanFile">
    <button id="saveOmejan">Upload foto</button>

    <p id="omejanStatus"></p>

    <div id="omejanList"></div>

</div>

<!-- ================= AGENDA ================= -->
<div class="box">

    <h2>📅 Agenda systeem</h2>

    <!-- SINGLE -->
    <select id="agendaType">
        <option value="match">Wedstrijd</option>
        <option value="training">Training</option>
        <option value="meeting">Vergadering</option>
    </select>

    <input id="agendaDate" placeholder="Datum (14 feb)">
    <input id="agendaTime" placeholder="Tijd (19:00)">
    <input id="agendaTeam1" placeholder="Team / Titel">
    <input id="agendaTeam2" placeholder="Tegenstander">

    <button id="saveAgenda">Opslaan</button>

    <hr>

    <!-- BULK -->
    <textarea id="agendaBulk" placeholder="
14 feb 14:50 Avanti HS1 Novitas HS1
21 feb 19:00 EMM HS1 Novitas HS1
03 jan 19:00 Jeugd training
"></textarea>

    <button id="importAgendaBulk">Import bulk</button>

    <hr>

    <!-- REPEAT -->
    <input id="repeatFrom" placeholder="Start datum">
    <input id="repeatUntil" placeholder="Eind datum">
    <input id="repeatTime" placeholder="19:00">
    <input id="repeatTitle" placeholder="Training naam">

    <button id="generateRepeat">Herhaling genereren</button>

    <p id="agendaStatus"></p>

    <div id="agendaList"></div>

</div>

</div>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="firebase.js"></script>
<script type="module" src="cms.js"></script>

</body>
</html>
