<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas CMS</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.box {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    background: #ff6a00;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
}

img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

</style>
</head>

<body>

<div class="topbar">🧡 HV NOVITAS CMS</div>

<div class="container">

<div class="box">

<h2>Nieuw bericht</h2>

<form id="newsForm">

<input type="text" id="title" placeholder="Titel" required>

<textarea id="text" placeholder="Bericht" required></textarea>

<input type="file" id="image" accept="image/*">

<button type="submit">Publiceren</button>

</form>

<p id="status"></p>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="cms.js"></script>

</body>

</html>
