<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>HV NOVITAS CMS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="topbar">

        <div class="logo-area">

            <img src="images/logo.png"
                 class="logo"
                 alt="HV Novitas">

            <div>

                <h1>HV NOVITAS CMS</h1>

                <p>Club Management System</p>

            </div>

        </div>

        <div class="user-area">

            <div class="status">

                <span class="online"></span>

                Ingelogd

            </div>

            <div id="userName">

                Erwin Bel

            </div>

            <div id="userEmail">

                hvnovitas@gmail.com

            </div>

            <button id="logoutButton">

                Uitloggen

            </button>

        </div>

    </header>

    <!-- ===========================
         DASHBOARD
    ============================ -->

    <main class="dashboard-main">

        <div class="dashboard-grid">

            <a
            href="news.html"
            class="dashboard-card">

                <div class="card-icon">

                    📰

                </div>

                <h2>

                    Nieuws

                </h2>

            </a>

            <a
            href="proeftrainingen.html"
            class="dashboard-card">

                <div class="card-icon">

                    🏃

                </div>

                <h2>

                    Proeftrainingen

                </h2>

            </a>

            <a
            href="inschrijvingen.html"
            class="dashboard-card">

                <div class="card-icon">

                    📝

                </div>

                <h2>

                    Inschrijvingen

                </h2>

            </a>

            <a
            href="agenda.html"
            class="dashboard-card">

                <div class="card-icon">

                    📅

                </div>

                <h2>

                    Agenda

                </h2>

            </a>

            <a
            href="sponsors.html"
            class="dashboard-card">

                <div class="card-icon">

                    🤝

                </div>

                <h2>

                    Sponsors

                </h2>

            </a>

            <a
            href="drive.html"
            class="dashboard-card">

                <div class="card-icon">

                    📸

                </div>

                <h2>

                    Foto's

                </h2>

            </a>

            <a
            href="instellingen.html"
            class="dashboard-card">

                <div class="card-icon">

                    ⚙️

                </div>

                <h2>

                    Instellingen

                </h2>

            </a>
              </div>

    </main>

    <!-- ===========================
         FOOTER
    ============================ -->

    <footer class="footer">

        <div class="footer-left">

            <div class="system-status">

                <span class="status-dot"></span>

                Google Drive

            </div>

            <div class="system-status">

                <span class="status-dot"></span>

                Google Sheets

            </div>

        </div>

        <div class="footer-center">

            HV Novitas CMS

        </div>

        <div class="footer-right">

            Versie 1.0

        </div>

    </footer>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
