<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <!-- TOPBAR -->
    <header class="topbar">

        <div class="logo-area">

            <img src="images/logo.png" class="logo" alt="HV Novitas">

            <div>
                <h1>HV NOVITAS CMS</h1>
                <p>Beheer Dashboard</p>
            </div>

        </div>

    </header>

    <!-- MENU -->
    <main class="dashboard-main">

        <div class="dashboard-grid">

            <!-- 🧡 CMS (BEHEER) -->
            <a href="cms.html" class="dashboard-card">
                <div class="card-icon">📰</div>
                <h2>Nieuws beheren</h2>
            </a>

            <!-- 👁 NEWS (PUBLIC VIEW) -->
            <a href="news.html" class="dashboard-card">
                <div class="card-icon">👁️</div>
                <h2>Nieuws bekijken</h2>
            </a>

            <!-- OVERIGE -->
            <a href="proeftrainingen.html" class="dashboard-card">
                <div class="card-icon">🏃</div>
                <h2>Proeftrainingen</h2>
            </a>

            <a href="agenda.html" class="dashboard-card">
                <div class="card-icon">📅</div>
                <h2>Agenda</h2>
            </a>

            <a href="sponsors.html" class="dashboard-card">
                <div class="card-icon">🤝</div>
                <h2>Sponsors</h2>
            </a>

            <a href="instellingen.html" class="dashboard-card">
                <div class="card-icon">⚙️</div>
                <h2>Instellingen</h2>
            </a>

        </div>

    </main>

</div>

<script type="module" src="dashboard.js"></script>

</body>
</html>
