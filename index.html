<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #f4f6f8;
}

/* TOPBAR */
.topbar {
    background: #ff6a00;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}

/* LAYOUT */
.container {
    display: flex;
    gap: 15px;
    padding: 15px;
}

/* COLUMNS */
.column {
    flex: 1;
    background: white;
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    min-height: 500px;
}

/* ITEMS */
.item {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

/* TYPES */
.match {
    border-left: 5px solid #ff6a00;
    padding-left: 10px;
}

.training {
    border-left: 5px solid #2ecc71;
    padding-left: 10px;
}

.meeting {
    border-left: 5px solid #3498db;
    padding-left: 10px;
}

.highlight {
    border-left: 5px solid gold;
    padding-left: 10px;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .container {
        flex-direction: column;
    }
}

</style>

</head>

<body>

<div class="topbar">
🧡 HV NOVITAS
</div>

<div class="container">

    <!-- ================= WEDSTRIJDEN ================= -->
    <div class="column" id="matches">
        <h3>⚔️ Wedstrijden</h3>
    </div>

    <!-- ================= ACTIVITEITEN ================= -->
    <div class="column" id="activities">
        <h3>🏋️ Activiteiten</h3>
    </div>

    <!-- ================= HIGHLIGHTS ================= -->
    <div class="column" id="highlights">
        <h3>🏆 Highlights</h3>
    </div>

</div>

<script type="module" src="index.js"></script>

</body>
</html>
