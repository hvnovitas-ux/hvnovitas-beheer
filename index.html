<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HV Novitas</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #eef1f5;
}

/* TOP */
.topbar {
    background: linear-gradient(90deg, #ff6a00, #ff8c1a);
    color: white;
    padding: 18px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
    padding: 15px;
}

/* CARD */
.column {
    background: white;
    border-radius: 14px;
    padding: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    min-height: 500px;
}

.column h3 {
    margin-top: 0;
    border-bottom: 2px solid #eee;
    padding-bottom: 8px;
}

/* ITEM */
.item {
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    background: #fafafa;
    border-left: 4px solid #ddd;
}

.match { border-left-color: #ff6a00; }
.training { border-left-color: #2ecc71; }
.meeting { border-left-color: #3498db; }
.highlight { border-left-color: gold; }

.item b {
    display: block;
    margin-bottom: 3px;
}

/* MOBILE */
@media (max-width: 900px) {
    .container {
        grid-template-columns: 1fr;
    }
}

</style>

</head>

<body>

<div class="topbar">🧡 HV NOVITAS</div>

<div class="container">

    <div class="column" id="matches">
        <h3>⚔️ Wedstrijden</h3>
    </div>

    <div class="column" id="activities">
        <h3>🏋️ Activiteiten</h3>
    </div>

    <div class="column" id="highlights">
        <h3>🏆 Highlights</h3>
    </div>

</div>

<script type="module" src="index.js"></script>

</body>
</html>
