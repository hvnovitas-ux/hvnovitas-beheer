<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>HV Novitas CMS - Proeftrainingen</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

    <!-- ======================================================
         HEADER
    ======================================================= -->

    <header class="topbar">

        <div class="logo">

            <img src="images/logo.png"
                 alt="HV Novitas">

            <div class="logo-info">

                <h1>HV NOVITAS CMS</h1>

                <p>Beheeromgeving</p>

            </div>

        </div>

        <div class="user">

            <button class="btn-black"
                    onclick="location.href='dashboard.html'">

                ⬅ Dashboard

            </button>

        </div>

    </header>

    <!-- ======================================================
         HERO
    ======================================================= -->

    <section class="hero">

        <h2>

            📝 Proeftrainingen

        </h2>

        <p>

            Beheer alle ontvangen proeftrainingen.

        </p>

    </section>

    <!-- ======================================================
         FILTER
    ======================================================= -->

    <section class="content-card">

        <div class="form-row">

            <div>

                <label>

                    🔍 Zoeken

                </label>

                <input
                    id="zoeken"
                    type="text"
                    placeholder="Zoek op naam, telefoon of e-mail">

            </div>

            <div>

                <label>

                    Weergave

                </label>

                <div
                    style="display:flex;
                           align-items:center;
                           gap:12px;
                           height:54px;">

                    <input
                        id="alleenNieuw"
                        type="checkbox">

                    <label
                        for="alleenNieuw">

                        Alleen nieuwe aanvragen

                    </label>

                </div>

            </div>

        </div>

        <div class="status-overview">

            <div class="status-box">

                <h3>

                    📊 Totaal

                </h3>

                <div
                    id="totaal"
                    class="number">

                    0

                </div>

            </div>

            <div class="status-box">

                <h3>

                    🟠 Nieuw

                </h3>

                <div
                    id="nieuw"
                    class="number">

                    0

                </div>

            </div>

            <div class="status-box">

                <h3>

                    ✔ Gelezen

                </h3>

                <div
                    id="gelezen"
                    class="number">

                    0

                </div>

            </div>

        </div>

    </section>

    <!-- ======================================================
         AANVRAGEN
    ======================================================= -->

    <section
        id="aanvragen"
        class="proeftraining-grid">

        <div class="content-card">

            <h2>

                Proeftrainingen worden geladen...

            </h2>

        </div>

    </section>

</div>

<!-- ======================================================
     GOOGLE API
======================================================= -->

<script src="https://apis.google.com/js/api.js"></script>

<script src="https://accounts.google.com/gsi/client"
        async
        defer></script>

<!-- ======================================================
     JAVASCRIPT
======================================================= -->

<script type="module"
        src="proeftrainingen.js"></script>

</body>

</html>
