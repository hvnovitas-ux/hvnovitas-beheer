<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>HV Novitas - Proeftrainingen</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div class="dashboard">

    <!-- HEADER -->

    <header class="topbar">

        <div class="logo">

            <img src="images/logo.png"
                 alt="HV Novitas">

            <div class="logo-info">

                <h1>HV NOVITAS CMS</h1>

                <p>Beheeromgeving</p>

            </div>

        </div>

        <div class="user">

            <button class="btn-black"
                    onclick="location.href='dashboard.html'">

                ⬅ Dashboard

            </button>

        </div>

    </header>

    <!-- PAGINA -->

    <section class="hero">

        <h2>

            📝 Proeftrainingen

        </h2>

        <p>

            Beheer alle ontvangen proeftrainingen.

        </p>

    </section>

    <!-- FILTER -->

    <section class="content-card">

        <div class="form-row">

            <div>

                <label>

                    🔍 Zoeken

                </label>

                <input
                    type="text"
                    id="zoeken"
                    placeholder="Zoek op naam, telefoon of e-mail...">

            </div>

            <div>

                <label>

                    &nbsp;

                </label>

                <div style="display:flex;align-items:center;height:54px;">

                    <input
                        type="checkbox"
                        id="alleenNieuw">

                    <label
                        for="alleenNieuw"
                        style="margin-left:12px;cursor:pointer;">

                        Alleen nieuwe aanvragen

                    </label>

                </div>

            </div>

        </div>

        <div class="status-overview">

            <div class="status-box">

                <h3>

                    📊 Totaal

                </h3>

                <div
                    class="number"
                    id="totaal">

                    0

                </div>

            </div>

            <div class="status-box">

                <h3>

                    🟠 Nieuw

                </h3>

                <div
                    class="number"
                    id="nieuw">

                    0

                </div>

            </div>

            <div class="status-box">

                <h3>

                    ✔ Gelezen

                </h3>

                <div
                    class="number"
                    id="gelezen">

                    0

                </div>

            </div>

        </div>

    </section>

    <!-- AANVRAGEN -->

    <section
        id="aanvragen"
        class="proeftraining-grid">

        <!-- JavaScript vult dit -->

    </section>

</div>

<script type="module"
        src="proeftrainingen.js"></script>

</body>

</html>
